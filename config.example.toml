[server]
host = "127.0.0.1"
port = 8080

[runtime]
type = "local"
workspace_root = "./data/workspaces"

[limits]
max_sandboxes = 100
max_concurrent_exec = 20
default_ttl_seconds = 600
default_exec_timeout_seconds = 60
max_stdout_bytes = 1048576
max_stderr_bytes = 1048576
max_file_size_bytes = 10485760
max_read_file_bytes = 10485760

[gc]
enabled = true
interval_seconds = 30
remove_expired = true

[security]
allow_absolute_paths = false
allow_path_traversal = false
hide_host_paths = true

[templates]
# Root directory of on-disk templates. Each subdirectory is a template named
# after the subdirectory; create a sandbox with {"template": "<name>"} to copy
# its contents into the new workspace at create time. Comment out to disable.
dir = "./data/templates"

[pool]
# Warm pool of pre-built bare sandboxes. Off by default: LocalProcessRuntime
# creates are already microsecond-scale, so this mainly reserves the interface
# for future runtimes (Docker/Firecracker). When enabled, `min_idle` bare
# workspace dirs are pre-created and handed out to template-less creates.
enabled = false
min_idle = 5

[persistence]
# Opt-in sandbox-metadata durability across restarts. Off by default: with
# `enabled = false`, sandbox state is purely in-memory and lost when the
# server stops, exactly as in v0.1. When enabled, sandbox metadata (id,
# status, ttl, env, metadata) is mirrored to a pure-Rust `redb` database file
# at `path` on every change and restored on the next startup, so sandboxes
# whose TTL has not elapsed survive a restart. Workspace file contents on
# disk are already durable; this only persists the *metadata* that maps ids to
# those directories.
enabled = false
path = "./data/lightsandbox.redb"
