name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — fully static musl binary, runs on any Linux distro
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            binary: lightsandbox-server
            artifact: lightsandbox-server-linux-x86_64
            use_cross: false
            extra_apt: musl-tools

          # Linux ARM64 — cross-compiled via the `cross` tool (Docker-based)
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            binary: lightsandbox-server
            artifact: lightsandbox-server-linux-arm64
            use_cross: true
            extra_apt: ""

          # Windows x86_64 — native MSVC build, no extra tooling needed
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: lightsandbox-server.exe
            artifact: lightsandbox-server-windows-x86_64.exe
            use_cross: false
            extra_apt: ""

          # macOS Apple Silicon (primary)
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: lightsandbox-server
            artifact: lightsandbox-server-macos-arm64
            use_cross: false
            extra_apt: ""

          # macOS Intel (for users on older Macs or Rosetta-free installs)
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: lightsandbox-server
            artifact: lightsandbox-server-macos-x86_64
            use_cross: false
            extra_apt: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install apt dependencies
        if: matrix.extra_apt != ''
        run: sudo apt-get install -y ${{ matrix.extra_apt }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-cargo-

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release -p lightsandbox-server --target ${{ matrix.target }}

      - name: Build native
        if: '!matrix.use_cross'
        run: cargo build --release -p lightsandbox-server --target ${{ matrix.target }}

      - name: Strip binary (Unix)
        if: runner.os != 'Windows'
        run: |
          strip target/${{ matrix.target }}/release/${{ matrix.binary }} || true
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Copy binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
